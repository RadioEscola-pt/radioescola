<h1 class="text-xl font-bold mb-6">Ganho</h1>

<div class="flex flex-col gap-1 mb-4">
  <label for="measurementType" class="text-sm font-medium">Tipo de medida</label>
  <div class="flex rounded shadow-sm border border-gray-400 overflow-hidden focus-within:border-slate-800 focus-within:ring focus-within:ring-slate-200 focus-within:ring-opacity-50 dark:border-slate-500">
    <select
      id="measurementType"
      class="w-full border-0 focus:ring-0 dark:bg-slate-600 px-3 py-2"
    >
      <option value="power">Potência (W)</option>
      <option value="current">Corrente (A)</option>
      <option value="voltage">Tensão (V)</option>
    </select>
  </div>
</div>

<div id="powerTable" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
  <div class="flex flex-col gap-1">
    <label for="power1" class="text-sm font-medium">Potência 1</label>
    <div class="flex rounded shadow-sm border border-gray-400 overflow-hidden focus-within:border-slate-800 focus-within:ring focus-within:ring-slate-200 focus-within:ring-opacity-50 dark:border-slate-500">
      <input type="number" step="0.01" id="power1" class="flex-1 min-w-0 border-0 focus:ring-0 dark:bg-slate-600 px-3 py-2" />
      <select id="Power1Unit" class="w-24 text-sm border-0 border-l border-gray-400 focus:ring-0 bg-gray-100 dark:bg-slate-700 dark:border-slate-500 px-2 py-2"></select>
    </div>
  </div>
  <div class="flex flex-col gap-1">
    <label for="power2" class="text-sm font-medium">Potência 2</label>
    <div class="flex rounded shadow-sm border border-gray-400 overflow-hidden focus-within:border-slate-800 focus-within:ring focus-within:ring-slate-200 focus-within:ring-opacity-50 dark:border-slate-500">
      <input type="number" step="0.01" id="power2" class="flex-1 min-w-0 border-0 focus:ring-0 dark:bg-slate-600 px-3 py-2" />
      <select id="Power2Unit" class="w-24 text-sm border-0 border-l border-gray-400 focus:ring-0 bg-gray-100 dark:bg-slate-700 dark:border-slate-500 px-2 py-2"></select>
    </div>
  </div>
</div>

<div id="currentTable" class="grid grid-cols-1 sm:grid-cols-2 gap-4" style="display: none;">
  <div class="flex flex-col gap-1">
    <label for="current1" class="text-sm font-medium">Corrente 1</label>
    <div class="flex rounded shadow-sm border border-gray-400 overflow-hidden focus-within:border-slate-800 focus-within:ring focus-within:ring-slate-200 focus-within:ring-opacity-50 dark:border-slate-500">
      <input type="number" step="0.01" id="current1" class="flex-1 min-w-0 border-0 focus:ring-0 dark:bg-slate-600 px-3 py-2" />
      <select id="current1Unit" class="w-24 text-sm border-0 border-l border-gray-400 focus:ring-0 bg-gray-100 dark:bg-slate-700 dark:border-slate-500 px-2 py-2"></select>
    </div>
  </div>
  <div class="flex flex-col gap-1">
    <label for="current2" class="text-sm font-medium">Corrente 2</label>
    <div class="flex rounded shadow-sm border border-gray-400 overflow-hidden focus-within:border-slate-800 focus-within:ring focus-within:ring-slate-200 focus-within:ring-opacity-50 dark:border-slate-500">
      <input type="number" step="0.01" id="current2" class="flex-1 min-w-0 border-0 focus:ring-0 dark:bg-slate-600 px-3 py-2" />
      <select id="current2Unit" class="w-24 text-sm border-0 border-l border-gray-400 focus:ring-0 bg-gray-100 dark:bg-slate-700 dark:border-slate-500 px-2 py-2"></select>
    </div>
  </div>
</div>

<div id="voltageTable" class="grid grid-cols-1 sm:grid-cols-2 gap-4" style="display: none;">
  <div class="flex flex-col gap-1">
    <label for="voltage1" class="text-sm font-medium">Tensão 1</label>
    <div class="flex rounded shadow-sm border border-gray-400 overflow-hidden focus-within:border-slate-800 focus-within:ring focus-within:ring-slate-200 focus-within:ring-opacity-50 dark:border-slate-500">
      <input type="number" step="0.01" id="voltage1" class="flex-1 min-w-0 border-0 focus:ring-0 dark:bg-slate-600 px-3 py-2" />
      <select id="voltage1Unit" class="w-24 text-sm border-0 border-l border-gray-400 focus:ring-0 bg-gray-100 dark:bg-slate-700 dark:border-slate-500 px-2 py-2"></select>
    </div>
  </div>
  <div class="flex flex-col gap-1">
    <label for="voltage2" class="text-sm font-medium">Tensão 2</label>
    <div class="flex rounded shadow-sm border border-gray-400 overflow-hidden focus-within:border-slate-800 focus-within:ring focus-within:ring-slate-200 focus-within:ring-opacity-50 dark:border-slate-500">
      <input type="number" step="0.01" id="voltage2" class="flex-1 min-w-0 border-0 focus:ring-0 dark:bg-slate-600 px-3 py-2" />
      <select id="voltage2Unit" class="w-24 text-sm border-0 border-l border-gray-400 focus:ring-0 bg-gray-100 dark:bg-slate-700 dark:border-slate-500 px-2 py-2"></select>
    </div>
  </div>
</div>

<div id="result" class="mt-6 px-4 py-3 rounded bg-slate-100 dark:bg-slate-700 text-lg font-mono font-bold min-h-[3rem] flex items-center"></div>

<button
  id="calculateButton"
  class="mt-4 w-full text-white bg-slate-700 hover:bg-slate-800 focus:ring-4 focus:ring-slate-300 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-slate-600 dark:hover:bg-slate-500 focus:outline-none dark:focus:ring-slate-800"
>
  Calcular Ganho
</button>
