<h1 class="text-xl font-bold mb-6">Reatância</h1>

<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
  <div class="flex flex-col gap-1 sm:col-span-2">
    <label for="calculationType" class="text-sm font-medium">Cálculo</label>
    <div class="flex rounded shadow-sm border border-gray-400 overflow-hidden focus-within:border-slate-800 focus-within:ring focus-within:ring-slate-200 focus-within:ring-opacity-50 dark:border-slate-500">
      <select
        id="calculationType"
        class="w-full border-0 focus:ring-0 dark:bg-slate-600 px-3 py-2"
      >
        <option value="H">Reatância Indutiva (X)</option>
        <option value="F">Reatância Capacitiva (X)</option>
      </select>
    </div>
  </div>

  <div class="flex flex-col gap-1">
    <label id="inductanceTXT" for="inductance" class="text-sm font-medium">Indutância</label>
    <div class="flex rounded shadow-sm border border-gray-400 overflow-hidden focus-within:border-slate-800 focus-within:ring focus-within:ring-slate-200 focus-within:ring-opacity-50 dark:border-slate-500">
      <input
        type="number"
        id="inductance"
        step="0.001"
        required
        class="flex-1 min-w-0 border-0 focus:ring-0 dark:bg-slate-600 px-3 py-2"
      />
      <select
        id="unit"
        class="w-24 text-sm border-0 border-l border-gray-400 focus:ring-0 bg-gray-100 dark:bg-slate-700 dark:border-slate-500 px-2 py-2"
      ></select>
    </div>
  </div>

  <div class="flex flex-col gap-1">
    <label for="frequency" class="text-sm font-medium">Frequência</label>
    <div class="flex rounded shadow-sm border border-gray-400 overflow-hidden focus-within:border-slate-800 focus-within:ring focus-within:ring-slate-200 focus-within:ring-opacity-50 dark:border-slate-500">
      <input
        type="number"
        id="frequency"
        required
        class="flex-1 min-w-0 border-0 focus:ring-0 dark:bg-slate-600 px-3 py-2"
      />
      <select
        id="frequencyUnit"
        class="w-24 text-sm border-0 border-l border-gray-400 focus:ring-0 bg-gray-100 dark:bg-slate-700 dark:border-slate-500 px-2 py-2"
      ></select>
    </div>
  </div>
</div>

<div id="result" class="mt-6 px-4 py-3 rounded bg-slate-100 dark:bg-slate-700 text-lg font-mono font-bold min-h-[3rem] flex items-center"></div>

<div class="mt-4 text-sm text-slate-600 dark:text-slate-400">
  Fórmula: <span id="formula" class="font-mono"></span>
</div>

<button
  id="calculate"
  class="mt-4 w-full text-white bg-slate-700 hover:bg-slate-800 focus:ring-4 focus:ring-slate-300 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-slate-600 dark:hover:bg-slate-500 focus:outline-none dark:focus:ring-slate-800"
>
  Calcular
</button>
