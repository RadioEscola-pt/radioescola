<h1 class="text-xl font-bold mb-6">VSWR</h1>

<div class="flex flex-col gap-1 mb-4">
  <label for="calculationType" class="text-sm font-medium">Método</label>
  <div class="flex rounded shadow-sm border border-gray-400 overflow-hidden focus-within:border-slate-800 focus-within:ring focus-within:ring-slate-200 focus-within:ring-opacity-50 dark:border-slate-500">
    <select
      id="calculationType"
      class="w-full border-0 focus:ring-0 dark:bg-slate-600 px-3 py-2"
    >
      <option value="tension">Tensão</option>
      <option value="impedance">Impedância</option>
    </select>
  </div>
</div>

<div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="tensions">
  <div class="flex flex-col gap-1">
    <label for="vmax" class="text-sm font-medium">Tensão máxima</label>
    <div class="flex rounded shadow-sm border border-gray-400 overflow-hidden focus-within:border-slate-800 focus-within:ring focus-within:ring-slate-200 focus-within:ring-opacity-50 dark:border-slate-500">
      <input
        type="number"
        id="vmax"
        class="flex-1 min-w-0 border-0 focus:ring-0 dark:bg-slate-600 px-3 py-2"
      />
    </div>
  </div>
  <div class="flex flex-col gap-1">
    <label for="vmin" class="text-sm font-medium">Tensão mínima</label>
    <div class="flex rounded shadow-sm border border-gray-400 overflow-hidden focus-within:border-slate-800 focus-within:ring focus-within:ring-slate-200 focus-within:ring-opacity-50 dark:border-slate-500">
      <input
        type="number"
        id="vmin"
        class="flex-1 min-w-0 border-0 focus:ring-0 dark:bg-slate-600 px-3 py-2"
      />
    </div>
  </div>
</div>

<div class="grid grid-cols-1 sm:grid-cols-2 gap-4 hidden" id="impedances">
  <div class="flex flex-col gap-1">
    <label for="zl" class="text-sm font-medium">Impedância da carga (ZL)</label>
    <div class="flex rounded shadow-sm border border-gray-400 overflow-hidden focus-within:border-slate-800 focus-within:ring focus-within:ring-slate-200 focus-within:ring-opacity-50 dark:border-slate-500">
      <input
        type="number"
        id="zl"
        placeholder="ex: antena"
        class="flex-1 min-w-0 border-0 focus:ring-0 dark:bg-slate-600 px-3 py-2"
      />
    </div>
  </div>
  <div class="flex flex-col gap-1">
    <label for="zo" class="text-sm font-medium">Impedância da fonte (Zo)</label>
    <div class="flex rounded shadow-sm border border-gray-400 overflow-hidden focus-within:border-slate-800 focus-within:ring focus-within:ring-slate-200 focus-within:ring-opacity-50 dark:border-slate-500">
      <input
        type="number"
        id="zo"
        placeholder="ex: cabo coaxial"
        class="flex-1 min-w-0 border-0 focus:ring-0 dark:bg-slate-600 px-3 py-2"
      />
    </div>
  </div>
</div>

<div id="vswrResult" class="mt-6 px-4 py-3 rounded bg-slate-100 dark:bg-slate-700 text-lg font-mono font-bold min-h-[3rem] flex items-center"></div>

<button
  id="calculateBtn"
  class="mt-4 w-full text-white bg-slate-700 hover:bg-slate-800 focus:ring-4 focus:ring-slate-300 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-slate-600 dark:hover:bg-slate-500 focus:outline-none dark:focus:ring-slate-800"
>
  Calcular
</button>
