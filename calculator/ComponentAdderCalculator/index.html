<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
  <div class="flex flex-col gap-1">
    <label for="componentType" class="text-sm font-medium">Componente</label>
    <select
      id="componentType"
      class="w-full rounded shadow-sm border-gray-400 focus:border-slate-800 focus:ring focus:ring-slate-200 focus:ring-opacity-50 dark:bg-slate-600 px-3 py-2"
    >
      <option value="F">Condensador (F)</option>
      <option value="Ω">Resistência (Ohms)</option>
      <option value="H">Bobine (H)</option>
    </select>
  </div>

  <div class="flex flex-col gap-1">
    <label for="seriesParallel" class="text-sm font-medium">Série/Paralelo</label>
    <select
      id="seriesParallel"
      class="w-full rounded shadow-sm border-gray-400 focus:border-slate-800 focus:ring focus:ring-slate-200 focus:ring-opacity-50 dark:bg-slate-600 px-3 py-2"
    >
      <option value="series">Série</option>
      <option value="parallel">Paralelo</option>
    </select>
  </div>
</div>

<table class="mt-6 w-full border-separate border-spacing-y-2" id="componentsTable">
  <thead>
    <tr class="text-sm font-medium">
      <th class="text-left pb-1 px-2">Valor</th>
      <th class="text-left pb-1 px-2 w-36">Unidade</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td class="px-2">
        <input
          type="text"
          class="w-full rounded shadow-sm border-gray-400 focus:border-slate-800 focus:ring focus:ring-slate-200 focus:ring-opacity-50 dark:bg-slate-600 px-3 py-2"
          value="1"
        />
      </td>
      <td class="px-2">
        <select
          class="w-full rounded shadow-sm border-gray-400 focus:border-slate-800 focus:ring focus:ring-slate-200 focus:ring-opacity-50 dark:bg-slate-600 px-3 py-2"
        ></select>
      </td>
    </tr>
    <tr>
      <td class="px-2">
        <input
          type="text"
          class="w-full rounded shadow-sm border-gray-400 focus:border-slate-800 focus:ring focus:ring-slate-200 focus:ring-opacity-50 dark:bg-slate-600 px-3 py-2"
          value="2"
        />
      </td>
      <td class="px-2">
        <select
          class="w-full rounded shadow-sm border-gray-400 focus:border-slate-800 focus:ring focus:ring-slate-200 focus:ring-opacity-50 dark:bg-slate-600 px-3 py-2"
        ></select>
      </td>
    </tr>
  </tbody>
  <tfoot>
    <tr>
      <th colspan="2" class="pt-4"></th>
    </tr>
    <tr class="bg-slate-100 dark:bg-slate-700">
      <td class="px-2 py-2 rounded-l" id="totalValue">Valor: 0</td>
      <td class="px-2 py-2 rounded-r">
        <select
          id="ResultIn"
          class="w-full rounded shadow-sm border-gray-400 focus:border-slate-800 focus:ring focus:ring-slate-200 focus:ring-opacity-50 dark:bg-slate-600 px-3 py-2"
        ></select>
      </td>
    </tr>
  </tfoot>
</table>

<div class="mt-6 flex flex-col sm:flex-row gap-2">
  <button
    id="addRowBtn"
    class="flex-1 text-white bg-green-600 hover:bg-green-700 focus:ring-4 focus:ring-green-300 font-medium rounded-lg text-sm px-4 py-2 dark:bg-green-700 dark:hover:bg-green-600 focus:outline-none dark:focus:ring-slate-800"
  >
    Adicionar
  </button>
  <button
    id="removeRowBtn"
    class="flex-1 text-white bg-orange-500 hover:bg-orange-600 focus:ring-4 focus:ring-orange-300 font-medium rounded-lg text-sm px-4 py-2 dark:bg-orange-700 dark:hover:bg-orange-600 focus:outline-none dark:focus:ring-slate-800"
  >
    Remover
  </button>
  <button
    id="calculateBtn"
    class="flex-1 text-white bg-slate-700 hover:bg-slate-800 focus:ring-4 focus:ring-slate-300 font-medium rounded-lg text-sm px-4 py-2 dark:bg-slate-600 dark:hover:bg-slate-500 focus:outline-none dark:focus:ring-slate-800"
  >
    Calcular
  </button>
</div>
