<h1 class="text-xl font-bold mb-6">Adicionar Componentes</h1>

<div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
  <div class="flex flex-col gap-1">
    <label for="componentType" class="text-sm font-medium">Componente</label>
    <div class="flex rounded shadow-sm border border-gray-400 overflow-hidden focus-within:border-slate-800 focus-within:ring focus-within:ring-slate-200 focus-within:ring-opacity-50 dark:border-slate-500">
      <select
        id="componentType"
        class="w-full border-0 focus:ring-0 dark:bg-slate-600 px-3 py-2"
      >
        <option value="F">Condensador (F)</option>
        <option value="Ω">Resistência (Ohms)</option>
        <option value="H">Bobine (H)</option>
      </select>
    </div>
  </div>

  <div class="flex flex-col gap-1">
    <label for="seriesParallel" class="text-sm font-medium">Série/Paralelo</label>
    <div class="flex rounded shadow-sm border border-gray-400 overflow-hidden focus-within:border-slate-800 focus-within:ring focus-within:ring-slate-200 focus-within:ring-opacity-50 dark:border-slate-500">
      <select
        id="seriesParallel"
        class="w-full border-0 focus:ring-0 dark:bg-slate-600 px-3 py-2"
      >
        <option value="series">Série</option>
        <option value="parallel">Paralelo</option>
      </select>
    </div>
  </div>
</div>

<div class="flex flex-col gap-2" id="componentsTable">
  <label class="text-sm font-medium">Valores</label>
  <div class="flex rounded shadow-sm border border-gray-400 overflow-hidden focus-within:border-slate-800 focus-within:ring focus-within:ring-slate-200 focus-within:ring-opacity-50 dark:border-slate-500">
    <input
      type="text"
      value="1"
      class="flex-1 min-w-0 border-0 focus:ring-0 dark:bg-slate-600 px-3 py-2"
    />
    <select class="w-24 text-sm border-0 border-l border-gray-400 focus:ring-0 bg-gray-100 dark:bg-slate-700 dark:border-slate-500 px-2 py-2"></select>
  </div>
  <div class="flex rounded shadow-sm border border-gray-400 overflow-hidden focus-within:border-slate-800 focus-within:ring focus-within:ring-slate-200 focus-within:ring-opacity-50 dark:border-slate-500">
    <input
      type="text"
      value="2"
      class="flex-1 min-w-0 border-0 focus:ring-0 dark:bg-slate-600 px-3 py-2"
    />
    <select class="w-24 text-sm border-0 border-l border-gray-400 focus:ring-0 bg-gray-100 dark:bg-slate-700 dark:border-slate-500 px-2 py-2"></select>
  </div>
</div>

<div class="flex gap-2 mt-2">
  <button
    id="addRowBtn"
    class="flex-1 text-white bg-green-600 hover:bg-green-700 focus:ring-4 focus:ring-green-300 font-medium rounded-lg text-sm px-4 py-2 dark:bg-green-700 dark:hover:bg-green-600 focus:outline-none dark:focus:ring-slate-800"
  >
    + Adicionar linha
  </button>
  <button
    id="removeRowBtn"
    class="flex-1 text-white bg-orange-500 hover:bg-orange-600 focus:ring-4 focus:ring-orange-300 font-medium rounded-lg text-sm px-4 py-2 dark:bg-orange-700 dark:hover:bg-orange-600 focus:outline-none dark:focus:ring-slate-800"
  >
    − Remover linha
  </button>
</div>

<div class="mt-6 flex flex-col gap-1">
  <label class="text-sm font-medium">Resultado</label>
  <div class="flex rounded border border-gray-400 overflow-hidden bg-slate-100 dark:bg-slate-700 dark:border-slate-500">
    <div id="totalValue" class="flex-1 min-w-0 px-3 py-2 font-mono text-lg font-bold min-h-[2.75rem] flex items-center">—</div>
    <select
      id="ResultIn"
      class="w-24 text-sm border-0 border-l border-gray-400 focus:ring-0 bg-slate-200 dark:bg-slate-800 dark:border-slate-500 px-2 py-2"
    ></select>
  </div>
</div>

<button
  id="calculateBtn"
  class="mt-4 w-full text-white bg-slate-700 hover:bg-slate-800 focus:ring-4 focus:ring-slate-300 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-slate-600 dark:hover:bg-slate-500 focus:outline-none dark:focus:ring-slate-800"
>
  Calcular
</button>
