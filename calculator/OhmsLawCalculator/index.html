<h1 class="text-xl font-bold mb-2">Lei de Ohm</h1>
<p class="text-sm text-slate-600 dark:text-slate-400 mb-6">Introduza 2 valores. O terceiro e a potência serão calculados.</p>

<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
  <div class="flex flex-col gap-1">
    <label for="knownValue1" class="text-sm font-medium">Tensão</label>
    <div class="flex rounded shadow-sm border border-gray-400 overflow-hidden focus-within:border-slate-800 focus-within:ring focus-within:ring-slate-200 focus-within:ring-opacity-50 dark:border-slate-500">
      <input
        type="number"
        id="knownValue1"
        class="flex-1 min-w-0 border-0 focus:ring-0 dark:bg-slate-600 px-3 py-2"
      />
      <select
        id="unit1"
        class="w-24 text-sm border-0 border-l border-gray-400 focus:ring-0 bg-gray-100 dark:bg-slate-700 dark:border-slate-500 px-2 py-2"
      ></select>
    </div>
  </div>

  <div class="flex flex-col gap-1">
    <label for="knownValue2" class="text-sm font-medium">Corrente</label>
    <div class="flex rounded shadow-sm border border-gray-400 overflow-hidden focus-within:border-slate-800 focus-within:ring focus-within:ring-slate-200 focus-within:ring-opacity-50 dark:border-slate-500">
      <input
        type="number"
        id="knownValue2"
        class="flex-1 min-w-0 border-0 focus:ring-0 dark:bg-slate-600 px-3 py-2"
      />
      <select
        id="unit2"
        class="w-24 text-sm border-0 border-l border-gray-400 focus:ring-0 bg-gray-100 dark:bg-slate-700 dark:border-slate-500 px-2 py-2"
      ></select>
    </div>
  </div>

  <div class="flex flex-col gap-1">
    <label for="knownValue3" class="text-sm font-medium">Resistência</label>
    <div class="flex rounded shadow-sm border border-gray-400 overflow-hidden focus-within:border-slate-800 focus-within:ring focus-within:ring-slate-200 focus-within:ring-opacity-50 dark:border-slate-500">
      <input
        type="number"
        id="knownValue3"
        class="flex-1 min-w-0 border-0 focus:ring-0 dark:bg-slate-600 px-3 py-2"
      />
      <select
        id="unit3"
        class="w-24 text-sm border-0 border-l border-gray-400 focus:ring-0 bg-gray-100 dark:bg-slate-700 dark:border-slate-500 px-2 py-2"
      ></select>
    </div>
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-sm font-medium">Potência</label>
    <div class="flex rounded border border-gray-400 overflow-hidden bg-slate-100 dark:bg-slate-700 dark:border-slate-500">
      <div id="knownValue4" class="flex-1 min-w-0 px-3 py-2 font-mono">—</div>
      <select
        id="unit4"
        class="w-24 text-sm border-0 border-l border-gray-400 focus:ring-0 bg-slate-200 dark:bg-slate-800 dark:border-slate-500 px-2 py-2"
      ></select>
    </div>
  </div>
</div>

<div id="result" class="mt-4 min-h-[1.25rem]"></div>

<button
  id="calculateButton"
  class="mt-4 w-full text-white bg-slate-700 hover:bg-slate-800 focus:ring-4 focus:ring-slate-300 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-slate-600 dark:hover:bg-slate-500 focus:outline-none dark:focus:ring-slate-800"
>
  Calcular
</button>
